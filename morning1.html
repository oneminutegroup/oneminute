<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출근보고</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  padding: 0;
}

.container {
  width: 100%;
  max-width: 720px;
  margin: 0 auto; 
  background: white;
  padding: 14px;
}

h2 {
  margin: 0 0 20px 0;
  font-size: 22px;
}

label.main-label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-family: Arial, sans-serif;
  font-size: 14px;
}

.section {
  margin-bottom: 26px;
}

.section-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}

.section-title-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.section-title-row .section-title {
  margin-bottom: 0;
}

.section-help {
  font-size: 13px;
  color: #666;
}

.room-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.room-type {
  width: 70px;
  font-weight: bold;
  font-size: 14px;
}

.room-options {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 5px 10px;
}

.room-options label {
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  font-size: 14px;
}

.room-options input {
  width: 16px;
  height: 16px;
  margin: 0;
}

.message-line {
  text-align: center;
  font-size: 14px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

#donePage {
  display: none;
  min-height: 100vh;
  background: white;
  padding: 40px 20px;
  text-align: center;
}

.done-message {
  font-size: 22px;
  font-weight: bold;
  line-height: 1.7;
  white-space: pre-line;
  margin-top: 60px;
}

/* 청소 적은 날 워닝 팝업 */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-box {
  width: 100%;
  max-width: 520px;
  background: white;
  border-radius: 14px;
  padding: 22px 18px 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.18);
}

.modal-message {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.7;
  color: #111;
  white-space: pre-line;
  margin-bottom: 18px;
}

.modal-button {
  width: 100%;
  padding: 14px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
}

@media (max-width: 480px) {
  .modal-message {
    font-size: 17px;
  }
}
</style>
</head>

<body>

<div class="container" id="formPage">

  <h2>출근보고</h2>

  <label class="main-label">근로자</label>
  <select id="worker">
    <option value="">선택하세요</option>
    <option>직원1</option>
    <option>직원2</option>
    <option>직원3</option>
  </select>

  <div class="section">
    <div class="section-title">청소객실 (<span id="cleanCount">0</span>)</div>
    <div id="clean"></div>
  </div>

  <div class="section">
    <div class="section-title-row">
      <div class="section-title">점검객실 (<span id="inspectCount">0</span>)</div>
      <div class="section-help">- 청소는 아닌데, 비어있는 객실을 점검 -</div>
    </div>
    <div id="inspect"></div>
  </div>

  <div class="section">
    <div class="section-title">노쇼</div>

    <select id="noshowSelect" onchange="toggleNoshow()">
      <option value="" selected>--</option>
      <option value="없음">없음</option>
      <option value="전날노쇼">전날노쇼</option>
      <option value="전전날노쇼">전전날노쇼</option>
    </select>

    <div id="noshowBox" style="display:none;">
      <div id="noshow"></div>
    </div>
  </div>

  <label class="main-label">특이사항</label>
  <textarea id="memo"></textarea>

  <div id="timeReasonSection" style="display:none;">
    <label class="main-label">출근시간 변동사유</label>
    <textarea id="timeReason" placeholder="출근시간 변동 사유를 입력하세요."></textarea>
  </div>

  <div class="message-line" id="customMessage"></div>

  <button onclick="submitForm()">출근완료</button>

</div>

<div id="donePage">
  <div class="done-message">출근 완료. 
5분 후에 워치 연결 테스트 알람갑니다. 
풀타임 착용하시고 개인폰 말고 게하폰 
항상 소지하세요.</div>
</div>

<!-- 청소 적은 날 워닝 모달 -->
<div id="lowCleanModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-message" id="lowCleanModalMessage">
오늘처럼 청소가 적은날은 청소 외 업무, 공용공간 청소 또는 평소에 닦지 않던곳 (커피머신 위, 도어락 전면말고 상단면, 도어벨 상단면, 복도 완강기 박스/소화기 등 먼지가 수북히 쌓인 곳)을 청소해주시고 퇴근보고 시 청소외 업무 코멘트 남겨주세요.
    </div>
    <button class="modal-button" onclick="confirmLowCleanWarning()">확인</button>
  </div>
</div>

<script>
const webhookUrl = "https://hook.us2.make.com/2y9kz1fqhfr2hl84og54aft1lcligjl5";

/*
  여기만 바꾸면 됨
  예시)
  오전출근보고: regularTime: "11:00"
  오후출근보고: regularTime: "15:00"
  테스트용: regularTime: "10:20", warningMinutes: 2, reasonMinutes: 4
*/
const settings = {
  regularTime: "11:00",
  warningMinutes: 20,
  reasonMinutes: 40
};

const LOW_CLEAN_WARNING_MESSAGE = `오늘처럼 청소가 적은날은 청소 외 업무, 공용공간 청소 또는 평소에 닦지 않던곳 (커피머신 위, 도어락 전면말고 상단면, 도어벨 상단면, 복도 완강기 박스/소화기 등등 먼지가 수북히 쌓인 곳)을 청소해주시고 퇴근보고 시 청소외 업무 코멘트 남겨주세요.`;

let pendingSubmitAfterLowCleanWarning = false;

const rooms = {
  "미니싱글": ["401","408","501","508"],
  "싱글": ["402","407","502","504","507"],
  "더블": ["403","404","405","503","505"],
  "패밀리": ["406","506"]
};

function createSection(id) {
  const container = document.getElementById(id);

  for (let type in rooms) {
    const line = document.createElement("div");
    line.className = "room-line";

    const t = document.createElement("div");
    t.className = "room-type";
    t.innerText = type;

    const opt = document.createElement("div");
    opt.className = "room-options";

    rooms[type].forEach(r => {
      const label = document.createElement("label");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = r;
      cb.name = id;
      cb.onchange = updateCount;

      label.appendChild(cb);
      label.append(" " + r);
      opt.appendChild(label);
    });

    line.appendChild(t);
    line.appendChild(opt);
    container.appendChild(line);
  }
}

createSection("clean");
createSection("inspect");
createSection("noshow");

function getChecked(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(e => e.value);
}

function updateCount() {
  document.getElementById("cleanCount").innerText = getChecked("clean").length;
  document.getElementById("inspectCount").innerText = getChecked("inspect").length;
}

function toggleNoshow() {
  const val = document.getElementById("noshowSelect").value;
  const box = document.getElementById("noshowBox");

  if (val === "전날노쇼" || val === "전전날노쇼") {
    box.style.display = "block";

    if (val === "전날노쇼") {
      alert("오후 근무자에게 내용 전달해주세요");
    }

    if (val === "전전날노쇼") {
      alert("오후 근무자에게 내용 전달해주세요. 비상임");
    }

  } else {
    box.style.display = "none";
    document.querySelectorAll('input[name="noshow"]').forEach(cb => cb.checked = false);
  }
}

function getRegularMinutes() {
  const [hour, minute] = settings.regularTime.split(":").map(Number);
  return hour * 60 + minute;
}

function getCurrentTimeDiffMinutes() {
  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();
  return currentMinutes - getRegularMinutes();
}

function formatTimeDiffText(diffMinutes) {
  if (diffMinutes === 0) return "정시";

  const abs = Math.abs(diffMinutes);
  return diffMinutes > 0 ? `${abs}분 늦음` : `${abs}분 빠름`;
}

function getWarningMessage() {
  return `정규출근시간은 ${settings.regularTime}입니다. 시간을 준수해주세요.
정규시간보다 ${settings.reasonMinutes}분 이상 변동시 사유를 입력해야 합니다.
(사장에게 사전보고를 한 경우는 이 메세지를 무시하세요)`;
}

function showTimeReasonField() {
  const section = document.getElementById("timeReasonSection");
  section.style.display = "block";
}

function showLowCleanWarningModal() {
  document.getElementById("lowCleanModalMessage").innerText = LOW_CLEAN_WARNING_MESSAGE;
  document.getElementById("lowCleanModal").style.display = "flex";
}

function hideLowCleanWarningModal() {
  document.getElementById("lowCleanModal").style.display = "none";
}

function confirmLowCleanWarning() {
  hideLowCleanWarningModal();

  if (pendingSubmitAfterLowCleanWarning) {
    pendingSubmitAfterLowCleanWarning = false;
    submitForm(true);
  }
}

async function submitForm(skipLowCleanWarning = false) {
  const worker = document.getElementById("worker").value;
  const clean = getChecked("clean");
  const inspect = getChecked("inspect");
  const noshowMode = document.getElementById("noshowSelect").value;
  const noshowRooms = getChecked("noshow");
  const memo = document.getElementById("memo").value.trim();
  const timeReason = document.getElementById("timeReason").value.trim();
  const timeReasonSection = document.getElementById("timeReasonSection");

  if (!worker) {
    alert("근로자를 선택하세요.");
    return;
  }

  if (noshowMode === "") {
    alert("노쇼를 선택해주세요");
    return;
  }

  if ((noshowMode === "전날노쇼" || noshowMode === "전전날노쇼") && noshowRooms.length === 0) {
    alert("노쇼 객실을 선택해주세요");
    return;
  }

  const diffMinutes = getCurrentTimeDiffMinutes();
  const absDiffMinutes = Math.abs(diffMinutes);

  if (absDiffMinutes >= settings.reasonMinutes) {
    if (timeReasonSection.style.display !== "block") {
      alert(getWarningMessage());
      showTimeReasonField();
      document.getElementById("timeReason").focus();
      return;
    }

    if (!timeReason) {
      alert("출근시간 변동 사유를 입력해주세요");
      document.getElementById("timeReason").focus();
      return;
    }
  } else if (absDiffMinutes >= settings.warningMinutes) {
    alert(getWarningMessage());
  }

  if (!skipLowCleanWarning && clean.length <= 3) {
    pendingSubmitAfterLowCleanWarning = true;
    showLowCleanWarningModal();
    return;
  }

  const cleanRoomsText = clean.join(", ") || "없음";
  const inspectRoomsText = inspect.join(", ") || "없음";
  const noshowRoomsText = noshowRooms.join(", ") || "없음";
  const noshowText = noshowMode === "없음" ? "없음" : noshowRoomsText;

  const submittedAt = new Date();
  const submittedAtText = submittedAt.toLocaleString("ko-KR");
  const timeVariationText = formatTimeDiffText(diffMinutes);

  const text =
`[출근보고]
근로자: ${worker}
제출시각: ${submittedAtText}

청소객실: ${clean.length}개
${cleanRoomsText}

점검객실: ${inspect.length}개
${inspectRoomsText}

노쇼: ${noshowMode} / 객실: ${noshowText}

특이사항: ${memo || "없음"}`;

  const payload = {
    report_type: "출근보고",
    shift: "오전",
    submitted_at: submittedAt.toISOString(),
    submitted_at_text: submittedAtText,

    worker: worker,

    regular_time: settings.regularTime,
    warning_minutes: settings.warningMinutes,
    reason_minutes: settings.reasonMinutes,
    time_diff_minutes: diffMinutes,
    time_diff_abs_minutes: absDiffMinutes,
    time_variation_text: timeVariationText,
    time_reason: timeReason || "없음",

    clean_count: clean.length,
    clean_rooms: cleanRoomsText,
    clean_rooms_array: clean,

    inspect_count: inspect.length,
    inspect_rooms: inspectRoomsText,
    inspect_rooms_array: inspect,

    noshow_mode: noshowMode,
    noshow_rooms: noshowRoomsText,
    noshow_rooms_array: noshowRooms,
    noshow_text: noshowText,

    memo: memo || "없음",

    text: text
  };

  try {
    const response = await fetch(webhookUrl, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      throw new Error("Webhook 전송 실패");
    }

    document.getElementById("formPage").style.display = "none";
    document.getElementById("donePage").style.display = "block";
    window.scrollTo(0, 0);

  } catch (error) {
    alert("전송 실패");
    console.error(error);
  }
}
</script>

</body>
</html>
