<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퇴근보고</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  padding: 0;
}

.container {
  width: 100%;
  background: white;
  padding: 14px;
}

h2 {
  margin: 0 0 20px 0;
  font-size: 22px;
}

label.main-label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}

select, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section {
  margin-bottom: 26px;
}

.section-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}

/* 🔥 추가된 부분 */
.section-title-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.section-help {
  font-size: 13px;
  color: #666;
}
/* 🔥 여기까지 */

.room-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.room-type {
  width: 70px;
  font-weight: bold;
  font-size: 14px;
}

.room-options {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 5px 10px;
}

.room-options label {
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  font-size: 14px;
}

.room-options input {
  width: 16px;
  height: 16px;
  margin: 0;
}

.message-line {
  text-align: center;
  font-size: 14px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 15px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

#donePage {
  display: none;
  min-height: 100vh;
  background: white;
  padding: 40px 20px;
  text-align: center;
}

.done-message {
  font-size: 22px;
  font-weight: bold;
  line-height: 1.7;
  white-space: pre-line;
  margin-top: 60px;
}
</style>
</head>

<body>

<div class="container" id="formPage">

  <h2>퇴근보고</h2>

  <label class="main-label">근로자</label>
  <select id="worker">
    <option value="">선택하세요</option>
    <option>직원1</option>
    <option>직원2</option>
    <option>직원3</option>
  </select>

  <div class="section">
    <div class="section-title">체크인 완료 (<span id="checkinDoneCount">0</span>)</div>
    <div id="checkinDone"></div>
  </div>

  <div class="section">
    <div class="section-title">체크인 예정 (<span id="checkinPlannedCount">0</span>)</div>
    <div id="checkinPlanned"></div>
  </div>

  <div class="section">
    <div class="section-title">공실 (<span id="vacantCount">0</span>)</div>
    <div id="vacant"></div>
  </div>

  <div class="section">
    <div class="section-title">노쇼</div>

    <select id="noshowSelect" onchange="toggleNoshow()">
      <option value="" selected>--</option>
      <option value="없음">없음</option>
      <option value="전날노쇼">전날노쇼</option>
      <option value="전전날노쇼">전전날노쇼</option>
    </select>

    <div id="noshowBox" style="display:none;">
      <div id="noshow"></div>
    </div>
  </div>

  <!-- 🔥 이불오염 설명 추가 -->
  <div class="section-title-row" style="margin-bottom:8px;">
    <div class="section-title" style="margin-bottom:0;">이불오염</div>
    <div class="section-help">- 오염된 침구류 개수 선택 -</div>
  </div>
  <select id="stainCount">
    <option value="" selected>--</option>
    <option value="없음">없음</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
  </select>

  <label class="main-label">특이사항, 청소 외 업무</label>
  <textarea id="memo"></textarea>

  <div class="message-line" id="customMessage"></div>

  <button onclick="submitForm()">퇴근완료</button>

</div>

<div id="donePage">
  <div class="done-message">퇴근 완료.</div>
</div>

<script>
// 기존 JS 그대로 유지 (생략 없음)
// 👉 너 기존 코드 그대로 붙어있으면 됨
</script>

</body>
</html>
